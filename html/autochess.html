<div id="game-autochess" style="display: none;min-height: min-content;" x-show="Autochess.state.enabled" x-cloak class="bottom-0 mt-4 border bg-wood z-30 flex flex-col items-center p-2 pointer-events-none overflow-y-auto w-full">
	<div class="max-w-full w-full">
		<div class="w-full flex justify-between items-center pb-2 px-2 pointer-events-auto">
			<h1 class="text-lg font-bold uppercase">Romance of the Dice Kingdom</h1>
			<div class="flex items-center space-x-4">
				<div class="ml-4 font-bold">[<span x-text="Autochess.state.round"></span>/<span x-text="Autochess.state.maxRound"></span>]</div>
				<!-- <button class="p-1 text-sm hover:bg-black hover:text-white" @click="location.href='/'">[Home]</button> -->
			</div>
		</div>

		<!-- PREPARATION PHASE -->
		<div style="display: none;" x-show="Autochess.state.phase === 'PREPARATION'" class="w-full space-y-2 pointer-events-auto">
			<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
				<div class="col-span-2 px-1 md:px-8 md:border-r">
					<h2 class="font-bold uppercase pb-1">Your Army (<span x-text="players[0]?.dice?.length"></span>) - <span class="text-xs italic text-gray-500">First 6 deployed</span></h2>
					<div class="grid grid-cols-6 gap-1 text-xs">
						<template x-for="(unit, index) in players[0]?.dice" :key="unit.id">
							<div class="border text-center p-1 cursor-pointer transition-all hover:shadow-sm"
								 :class="Autochess.state.selectedUnitId === unit.id ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-300 z-10' : (index < 6 ? 'border-green-500 bg-green-50' : 'border-gray-200 bg-white')"
								 @click="clickAutochessUnit(unit)">
								<div class="flex justify-between items-start">
									<span x-text="index + 1" class="text-gray-400 font-bold"></span>
									<div class="flex items-center space-x-1">
										<span x-show="unit.veteranLevel > 0 && ((unit.veteranLevel >= 1 && !unit.perks?.tier1) || (unit.veteranLevel >= 2 && !unit.perks?.tier2) || (unit.veteranLevel >= 3 && !unit.perks?.tier3))"
											  class=" font-black animate-pulse text-xs">⚡</span>
										<span x-show="unit.veteranLevel > 0" class=" font-bold">★<span x-text="unit.veteranLevel"></span></span>
									</div>
								</div>
								<img class="inline h-6 w-6" :src="unit.iconUrl" width="16" height="16">
								<div class="text-sm font-bold uppercase leading-tight truncate" x-text="unit.displayName"></div>
								<div class="text-xs mt-1 text-gray-600">
									ATK:<span x-text="unit.attack"></span> HP:<span x-text="unit.hp"></span>
								</div>
								<div class="flex justify-center mt-1 space-x-2" x-show="Autochess.state.selectedUnitId === unit.id">
									<button @click.stop="moveAutochessUnit(0, index, index - 1)" class="bg-white hover:bg-black hover:text-white" :disabled="index === 0">◄</button>
									<button @click.stop="moveAutochessUnit(0, index, index + 1)" class="bg-white hover:bg-black hover:text-white" :disabled="index === players[0].dice.length - 1">►</button>
								</div>
							</div>
						</template>
					</div>
				</div>
				<div class="" x-show="(window.innerWidth > 640) || Autochess.state.inventories[0]?.length">
					<h2 class="font-bold uppercase pb-1">Recruitment</h2>
					<div class="flex flex-wrap justify-center gap-2" x-show="Autochess.state.inventories[0]?.length">
						<template x-for="(unit, index) in Autochess.state.inventories[0]" :key="unit.id">
							<button @click="recruitAutochessUnit(0, index)" class="border bg-white hover:bg-black hover:text-white transition-colors p-1 w-16 text-center">
								<img class="inline h-6 w-6" :src="unit.iconUrl" width="16" height="16">
								<div class="text-sm mt-1 uppercase truncate" x-text="unit.name"></div>
								<div class="text-xs text-gray-500">ATK:<span x-text="unit.attack"></span></div>
							</button>
						</template>
						<template x-if="Autochess.state.inventories[0] && Autochess.state.inventories[0].length === 0">
							<div class="italic text-gray-500">No recruits available.</div>
						</template>
					</div>
					<div class="text-center mt-2 pt-2 border-t border-dashed border-gray-400" x-show="Autochess.state.inventories[0]?.length">
						<button @click="rerollAutochessRecruits(0)" :disabled="Autochess.state.rerolls[0] <= 0" class="border px-3 py-1 text-sm hover:bg-black hover:text-white disabled:opacity-50 uppercase">
							Reroll (<span x-text="Autochess.state.rerolls[0]"></span>)
						</button>
					</div>
				</div>
			</div>

			<!-- Selected Unit Details & Skill Tree Panel -->
			<template x-if="Autochess.state.selectedUnitId && players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)">
				<div class="mt-4 p-4 transition-all duration-300 w-full">
					<div class="flex flex-wrap items-center justify-between mb-3">
						<div class="flex items-center space-x-2">
							<img class="h-10 w-10" :src="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.iconUrl">
							<div>
								<h3 class="text-md font-bold uppercase tracking-wider " x-text="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.displayName"></h3>
								<span class="text-sm text-gray-500 font-bold uppercase">Unit Details & Skill Tree</span>
							</div>
						</div>
						<div class="text-xs font-bold  space-x-2">
							<span>HP: <span x-text="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.maxHP"></span></span>
							<span>•</span>
							<span>ATK: <span x-text="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.attack"></span></span>
							<span>•</span>
							<span>ARMOR: <span x-text="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.currentArmor"></span></span>
							<span>•</span>
							<span>SPEED: <span x-text="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.speed"></span></span>
						</div>
					</div>

					<div class="grid grid-cols-1 md:grid-cols-3 gap-3">
						<template x-for="tier in ['tier1', 'tier2', 'tier3']" :key="tier">
							<div class="p-3 border rounded relative flex flex-col justify-between"
								 :class="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.veteranLevel >= (tier === 'tier1' ? 1 : tier === 'tier2' ? 2 : 3)
									? '' : 'border-gray-200 opacity-50'">

								<div>
									<div class="flex justify-between items-center mb-1">
										<span class="text-sm font-black uppercase text-gray-500" x-text="tier.replace('tier', 'Tier ')"></span>
										<span class="text-xs font-bold px-1 rounded"
											  :class="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.veteranLevel >= (tier === 'tier1' ? 1 : tier === 'tier2' ? 2 : 3)
												? '' : 'bg-gray-200 text-gray-600'"
											  x-text="tier === 'tier1' ? '★' : tier === 'tier2' ? '★★' : '★★★'"></span>
									</div>

									<!-- If Locked -->
									<template x-if="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.veteranLevel < (tier === 'tier1' ? 1 : tier === 'tier2' ? 2 : 3)">
										<div class="text-center py-4 text-xs italic text-gray-600">
											🔒 Requires level <span x-text="tier === 'tier1' ? '★1' : tier === 'tier2' ? '★2' : '★3'"></span>
										</div>
									</template>

									<!-- If Unlocked and has chosen a skill -->
									<template x-if="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.veteranLevel >= (tier === 'tier1' ? 1 : tier === 'tier2' ? 2 : 3) && players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.perks?.[tier]">
										<div class="py-1">
											<div class="text-sm font-bold " x-text="CampaignManager.PERK_DESCRIPTIONS[players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.value]?.[tier]?.[players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.perks?.[tier]]?.name"></div>
											<div class="text-sm text-gray-600 mt-1 leading-tight" x-text="CampaignManager.PERK_DESCRIPTIONS[players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.value]?.[tier]?.[players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.perks?.[tier]]?.desc"></div>
										</div>
									</template>

									<!-- If Unlocked but NOT chosen yet -->
									<template x-if="players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.veteranLevel >= (tier === 'tier1' ? 1 : tier === 'tier2' ? 2 : 3) && !players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.perks?.[tier]">
										<div class="space-y-2 py-2">
											<button @click="selectAutochessUnitSkill(Autochess.state.selectedUnitId, tier, 'A')"
													class="w-full text-left p-2 border rounded bg-white transition-all shadow-sm group">
												<div class="text-xs font-bold uppercase  group-hover:text-white" x-text="CampaignManager.PERK_DESCRIPTIONS[players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.value]?.[tier]?.['A']?.name"></div>
												<div class="text-sm text-gray-500 group-hover: mt-0.5 leading-tight" x-text="CampaignManager.PERK_DESCRIPTIONS[players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.value]?.[tier]?.['A']?.desc"></div>
											</button>
											<button @click="selectAutochessUnitSkill(Autochess.state.selectedUnitId, tier, 'B')"
													class="w-full text-left p-2 border rounded bg-white transition-all shadow-sm group">
												<div class="text-xs font-bold uppercase  group-hover:text-white" x-text="CampaignManager.PERK_DESCRIPTIONS[players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.value]?.[tier]?.['B']?.name"></div>
												<div class="text-sm text-gray-500 group-hover: mt-0.5 leading-tight" x-text="CampaignManager.PERK_DESCRIPTIONS[players[0]?.dice?.find(u => u.id === Autochess.state.selectedUnitId)?.value]?.[tier]?.['B']?.desc"></div>
											</button>
										</div>
									</template>
								</div>

							</div>
						</template>
					</div>
				</div>
			</template>

			<div class="text-center pt-2">
				<div class="inline mb-2">
					<label class="font-bold mr-2">Strategy:</label>
					<select x-model="Autochess.state.selectedProfile" class="border px-2 py-1 uppercase">
						<template x-for="p in getProfileNames()" :key="p">
							<option :value="p" x-text="p"></option>
						</template>
					</select>
				</div>
				<button @click="startAutochessCombat()" class="inline bg-black text-white px-2 py-1 font-bold hover:bg-gray-800 uppercase cursor-pointer">
					Auto-Battle
				</button>
			</div>
		</div>

		<!-- COMBAT PHASE UI (Board is behind) -->
		<div style="display: none;" x-show="Autochess.state.phase === 'COMBAT'" class="w-full flex flex-col items-center">
			<div class="w-full bg-gray-700 h-1 mb-2 rounded-full overflow-hidden" x-show="Autochess?.state?.roundTimer">
				<div class="bg-green-500 h-1 rounded-full transition-all duration-100" :style="'width: ' + (Autochess.state.roundTimer / 60 * 100) + '%'"></div>
			</div>
			<div class="w-full flex justify-between mb-4 text-sm font-bold pointer-events-auto">
				<div class="text-blue-700 uppercase">Player: <span x-text="players[0]?.dice?.filter(u => u.isDeployed && !u.isDeath).length || 0"></span></div>
				<!-- <div class="animate-pulse uppercase mx-2 ">Remain: <span x-text="Math.ceil(60 - Autochess.state.roundTimer)"></span>s</div> -->
				<div class="text-red-700 uppercase">Enemy: <span x-text="players.slice(1).reduce((acc, p) => acc + (p.dice?.filter(u => u.isDeployed && !u.isDeath).length || 0), 0)"></span></div>
			</div>
		</div>

		<!-- RECAP PHASE -->
		<div style="display: none;" x-show="Autochess.state.phase === 'RECAP'" class="w-full inset-0 flex items-center justify-center z-20 pointer-events-auto">
			<div class="border p-2 max-w-sm w-full text-center">
				<h2 class="text-lg font-black mb-2 uppercase italic" x-text="Autochess.state.lastResult"></h2>
				<p class="mb-2 font-bold" x-text="Autochess.state.lastResult === 'WIN' ? 'Your survivors grew stronger!' : 'The kingdom has fallen.'"></p>
				<button @click="nextAutochessRound()" class="w-full bg-black text-white py-2 font-black text-lg hover:bg-gray-800 transition-colors uppercase">
					Continue
				</button>
			</div>
		</div>
	</div>
</div>
