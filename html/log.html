<div id="game-log" style="display: none;" x-show="showLog && (Autochess.state.enabled || !phase.includes('SETUP_')) " class="bg-wood bottom-0 left-0 w-screen text-black p-1 text-xs font-mono h-28 md:h-24 overflow-y-auto border-t ">
	<template x-for="log in messageLog" :key="log.id">
		<p x-text="log.message" :class="PLAYER_CONFIG[log.message?.match(/P(\d)/)?.[1] - 1]?.logColor"></p>
	</template>
</div>
