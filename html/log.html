<div id="game-log" style="display: none;"
	class="bg-wood fixed bottom-0 left-0 w-screen text-black p-1 text-xs font-mono h-28 md:h-24 overflow-y-auto border-t"
	x-show="showLog
		&& (Autochess?.state?.enabled ? (Autochess?.state?.phase != 'PREPARATION') : !phase.includes('SETUP_'))
	"
>
	<template x-for="log in messageLog" :key="log.id">
		<p x-text="log.message" :class="PLAYER_CONFIG[log.message?.match(/P(\d)/)?.[1] - 1]?.logColor"></p>
	</template>
</div>
