<!-- Hex Grid -->
<div class="hex-grid-container relative" :class="'radius-' + (hexGrid.radius || 5)" :style="hexGrid.style">
	<template x-for="hex in hexes" :key="hex.id">
		<div class="hexagon absolute select-none flex items-center justify-center"
			:class="hexColor(hex) + ' hex-' + hex.id"
			:style="hexStyle(hex) + ';cursor:' + hexCursor(hex)"
			:data-id="hex.id"
			:data-sprite-gif="empiresModeEnabled && hex.unit?.spriteUrl?.endsWith('.gif') ? hex.unit.spriteUrl : null"
			@click="handleHexClick(hex.id)"
			@mouseenter="hex.unit && (!isAutochessOnlinePrep || hex.unit?.playerId === autochessPlayerIndex) && unitPanelHoverEnter(hex.id); cursorSprite = hexCursorSprite(hex); if ($el.dataset.spriteGif) { const g = $el.dataset.spriteGif, s = g.replace('.gif','.png'); $el.style.backgroundImage = $el.style.backgroundImage.replace(s, g); }"
			@mouseleave="unitPanelHoverLeave(hex.id); cursorSprite = null; if ($el.dataset.spriteGif) { const g = $el.dataset.spriteGif, s = g.replace('.gif','.png'); $el.style.backgroundImage = $el.style.backgroundImage.replace(g, s); }"
		>
			<div class="hex-id fixed self-start text-xs text-gray-300" x-show="debug?.coordinate" x-text="[hex.id].join(' ')"></div>
			<div class="hex-coordinate fixed self-end text-sm text-gray-400" x-show="debug?.coordinate" x-text="[hex.q, hex.r].join(', ')"></div>
			<div class="hex-content text-xxs text-center relative">
				<span style="top:-0.5rem;right:-0.5rem;color:#44444444" class="absolute" x-show="!hex.unit" x-text="hex.id"></span>

				<div x-show="hex.unit && (!isAutochessOnlinePrep || hex.unit?.playerId === autochessPlayerIndex)" class="contents">
					<span class="text-lg invisible"
						:class="PLAYER_CONFIG[hex.unit?.playerId]?.logColor || ''"
						x-text="hex.unit?.value"
					>
					</span>

					<span data-game-attack style="top:-0.5rem;right:0.6rem;" class="absolute cursor-not-allowed z-10 text-red-700"
						x-text="hex.unit?.attack + (hex.unit?.veteranLevel ? '★'.repeat(hex.unit.veteranLevel) : '')">
					</span>
					<span style="top:-0.7rem;right:-0.1rem;" class="absolute cursor-not-allowed z-10 text-yellow-600 font-bold text-sm"
						x-show="empiresModeEnabled && hex.unit && EMPIRES[players[hex.unit.playerId]?.empire]?.unit === hex.unit.value">★</span>
					<span data-game-armor style="top:-0.5rem;right:-0.4rem;" class="absolute cursor-not-allowed z-10 text-gray-700"
						:class="(hex.unit?.effectiveArmor > hex.unit?.armor) ? 'font-bold' : ''"
						x-text="hex.unit?.effectiveArmor">
					</span>
					<span style="top:-0.5rem;right:-0.25rem;" class="absolute cursor-not-allowed text-green-700 font-bold"
						x-show="hex.unit?.isRerolled">🎲
					</span>
					<span style="top:0.25rem;right:-0.8rem;" class="absolute cursor-not-allowed text-blue-900 font-bold"
						x-show="hex.unit?.isGuarding" x-html="(hex.unit?.isGuarding == 2) ? '🛡' : '⛨'">
					</span>
					<span style="top:0.25rem;right:0.8rem;" class="absolute cursor-not-allowed text-red-900 font-bold"
						x-show="hex.unit?.skirmishBuff">⚡
					</span>
					<span data-combat-hit class="absolute cursor-not-allowed text-sm z-20 transition-all duration-300 hidden"
						:style="'top:' + (hex.unit?.isHitDy || 0) + 'px;right:' + -(hex.unit?.isHitDx || 0) + 'px'"
					>💢
					</span>

				<!-- Campaign HP Bar -->
				<div x-show="isCampaign" style="bottom:-0.25rem;left:-0.45rem" class="absolute cursor-not-allowed w-6 h-1.5 bg-gray-800 rounded-full border border-gray-900 overflow-hidden">
					<div data-game-hp class="h-full bg-green-500 "
						:style="'width: ' + (hex.unit?.currentHP / hex.unit?.maxHP * 100) + '%'"
						:class="{'bg-yellow-500': hex.unit?.currentHP / hex.unit?.maxHP < 0.5, 'bg-red-500': hex.unit?.currentHP / hex.unit?.maxHP < 0.25}">
					</div>
				</div>

				<!-- Autochess HP Bar -->
				<div x-show="Autochess.state.enabled" style="bottom:-0.25rem;left:-0.45rem" class="absolute cursor-not-allowed w-6 h-2.5 bg-gray-800 rounded-full border border-gray-900 overflow-hidden flex flex-col justify-between p-0.5">
					<div data-combat-hp class="h-1.5 bg-green-500 rounded-full transition-all"
						:style="'width: ' + (hex.unit?.hp / hex.unit?.maxHP * 100) + '%; transition-duration: ' + (Autochess.state.pulseMs || 90) + 'ms'"
						:class="{'bg-yellow-500': hex.unit?.hp / hex.unit?.maxHP < 0.5, 'bg-red-500': hex.unit?.hp / hex.unit?.maxHP < 0.25}">
					</div>
					<div data-combat-gauge class="h-1 bg-blue-400 rounded-full mt-0.5 transition-all"
						:style="'width: ' + (hex.unit?.actionGauge || 0) + '%; transition-duration: ' + (Autochess.state.pulseMs || 90) + 'ms'">
					</div>
				</div>
				</div>
			</div>
		</div>
	</template>

	<!-- Trail Arrow -->
	<svg :height="hexGrid.gridHeight || 0" :width="hexGrid.gridWidth || 0" class="absolute inset-0 pointer-events-none z-10"
		style="display: none;" x-show="!Autochess.state.enabled && !phase.startsWith('SETUP')">
		<!-- Movement -->
		<g x-show="trail && trail.fromHex && trail.toHex">
			<circle
				:cx="trail.fromHex?.trailX || 0" :cy="trail.fromHex?.trailY || 0"
				r="3" style="fill: black;"
			/>
			<line
				:x1="trail.fromHex?.trailX || 0"
				:y1="trail.fromHex?.trailY || 0"
				:x2="trail.fromHex?.trailX + (trail.toHex?.trailX - trail.fromHex?.trailX) * 0.55 * Math.log1p(trail.dist + 1) || 0"
				:y2="trail.fromHex?.trailY + (trail.toHex?.trailY - trail.fromHex?.trailY) * 0.55 * Math.log1p(trail.dist + 1) || 0"
				style="stroke-width: 2;stroke: black;"
			/>
		</g>

		<!-- Attack (melee: gray dashed, ranged: orange dashed) -->
		<g x-show="trailAttack && trailAttack.fromHex && trailAttack.toHex">
			<circle
				:cx="trailAttack.fromHex?.trailX || 0" :cy="trailAttack.fromHex?.trailY || 0"
				r="3" :style="trailAttack.combatType === 'RANGED_ATTACK' ? 'fill: #f97316;' : 'fill: gray;'"
			/>
			<line
				:x1="trailAttack.fromHex?.trailX || 0"
				:y1="trailAttack.fromHex?.trailY || 0"
				:x2="trailAttack.fromHex?.trailX + (trailAttack.toHex?.trailX - trailAttack.fromHex?.trailX) * 0.55 * Math.log1p(trailAttack.dist + 1) || 0"
				:y2="trailAttack.fromHex?.trailY + (trailAttack.toHex?.trailY - trailAttack.fromHex?.trailY) * 0.55 * Math.log1p(trailAttack.dist + 1) || 0"
				:style="trailAttack.combatType === 'RANGED_ATTACK' ? 'stroke-width: 2;stroke: #f97316;stroke-dasharray: 6 3;' : 'stroke-width: 2;stroke: gray;stroke-dasharray: 4;'"
			/>
		</g>

		<!-- Spell (purple line + label) -->
		<g x-show="trailSpell && trailSpell.fromHex && trailSpell.toHex">
			<circle
				:cx="trailSpell.fromHex?.trailX || 0" :cy="trailSpell.fromHex?.trailY || 0"
				r="4" style="fill: #a855f7;"
			/>
			<line
				:x1="trailSpell.fromHex?.trailX || 0"
				:y1="trailSpell.fromHex?.trailY || 0"
				:x2="trailSpell.toHex?.trailX || 0"
				:y2="trailSpell.toHex?.trailY || 0"
				style="stroke-width: 2;stroke: #a855f7;stroke-dasharray: 5 3;"
			/>
			<circle
				:cx="trailSpell.toHex?.trailX || 0" :cy="trailSpell.toHex?.trailY || 0"
				r="6" style="fill: none;stroke: #a855f7;stroke-width: 2;"
			/>
			<text
				:x="((trailSpell.fromHex?.trailX || 0) + (trailSpell.toHex?.trailX || 0)) / 2"
				:y="((trailSpell.fromHex?.trailY || 0) + (trailSpell.toHex?.trailY || 0)) / 2 - 6"
				style="fill: #a855f7;font-size: 9px;font-weight: bold;text-anchor: middle;paint-order: stroke;stroke: white;stroke-width: 3;"
				x-text="trailSpell.spellType"
			/>
		</g>
	</svg>

	<!-- Unit Info Panel -->
	<div x-init="loadComponent($el, 'unit-info-panel')"></div>

	<!-- Top Right -->
	<div x-init="loadComponent($el, 'auth')" class="absolute top-1 right-1 text-xs z-10"></div>

	<!-- Toolbars -->
	<div x-init="loadComponent($el, 'toolbars')"></div>
</div>
