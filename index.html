<!DOCTYPE html>
<html lang="en">
<head>
	<title>Hex Dice</title>

	<meta charset="UTF-8">
	<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> -->
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="color-scheme" content="light">
	<meta name="description" content="Hex Dice">
	<meta name="keywords" content="boardgame,hexagon,dice">
	<meta name="theme-color" content="#c3a471">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="Hex Dice">
	<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">

	<!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
	<meta property="og:image" content="/assets/infographics/hexdice_recap.png">
	<meta property="og:image:width" content="1200">
	<meta property="og:image:height" content="630">

	<!-- Twitter Card (X/Twitter) -->
	<meta name="twitter:card" content="Hex Dice is a tactical board game where players command armies of dice, using their face values to determine their unit type, abilities, and movement. Played on a hexagonal map, players maneuver their forces, engage in deterministic combat, and aim to defeat all opponents or capture their base.">
	<meta name="twitter:image" content="/assets/infographics/hexdice_recap.png">

	<meta id="hexdice_version" name="hexdice_version" content="___VERSION___">

	<link rel="canonical" :href="host">
	<link rel="shortcut icon" href="/assets/images/favicon.ico" type="image/x-icon">
	<link rel="manifest" href="/assets/manifest.json">
	<link rel="stylesheet" type="text/css" href="/assets/litewind.css" />
	<link rel="stylesheet" type="text/css" href="/assets/style.css?v=___VERSION___" />

	<script src="//accounts.google.com/gsi/client" async defer></script>
	<script type="text/javascript" src="/assets/mqtt.min.js" async defer></script>
	<script type="text/javascript" src="/assets/alpine.min.js" defer></script>

	<script type="text/javascript" src="/js/constants.js?v=___VERSION___"></script>
	<script type="text/javascript" src="/js/autochess.js?v=___VERSION___"></script>
	<script type="text/javascript" src="/js/audio.js?v=___VERSION___"></script>
	<script type="text/javascript" src="/js/game.js?v=___VERSION___"></script>
	<script type="text/javascript" src="/js/campaign/campaign-manager.js?v=___VERSION___"></script>
	<script type="text/javascript" src="/js/ai/heuristic-profiles.js?v=___VERSION___"></script>
	<script type="text/javascript" src="/js/ai/ai-heuristic.js?v=___VERSION___"></script>
	<script type="text/javascript" src="/js/ai/ai.js?v=___VERSION___"></script>

	<style type="text/tailwindcss">
		[x-cloak] { display: none !important; }

		@theme {
			--color-hexdefault: var(--color-lime-700);
			--color-hexselect: var(--color-emerald-400);
			--color-hexmove: var(--color-emerald-300);
			--color-hexmerge: var(--color-emerald-500);
			--color-hextarget: var(--color-amber-500);
			--color-hexdeploy: var(--color-yellow-500);
			--color-hexred: var(--color-red-700);
			--color-hexblue: var(--color-blue-700);
			--color-hexgreen: var(--color-emerald-600);
			--color-hexpurple: var(--color-purple-700);
		}
	</style>
</head>

<body class="text-black min-h-screen flex flex-col items-center font-mono"
	x-init="initAuth()"
	x-data="alpineHexDiceTacticGame()"
	@mousemove.window="cursorX = $event.clientX; cursorY = $event.clientY">

	<!-- Dice Container -->
	<div x-init="loadComponent($el, 'dice')"></div>

	<!-- Hex Grid Container -->
	<div class="flex-grow flex items-start justify-center w-full overflow-auto mt-6">
		<template x-if="isCampaign && showMinimap && !autochess">
			<div class="hex-grid-campaign-background fixed" :style="hexGrid.style">
			</div>
		</template>
		<!-- Hex Grid (contains unit-info-panel, auth, toolbars) -->
		<div x-init="loadComponent($el, 'hex-grid')"></div>
	</div>

	<!-- Autochess UI Overlay -->
	<div x-init="loadComponent($el, 'autochess')"></div>

	<!-- Game Controller -->
	<div x-init="loadComponent($el, 'controller')"></div>

	<!-- Message Log -->
	<div x-init="loadComponent($el, 'log')"></div>

	<!-- Cursor sprite follower -->
	<template x-if="cursorSprite">
		<img
			:src="cursorSprite"
			class="fixed pointer-events-none z-90"
			:style="`left: ${cursorX + 12}px; top: ${cursorY - 8}px; width: 32px; height: 32px;`"
		>
	</template>

	<div id="midi-container" style="display: none;"></div>

	<!-- Devotion Menu (The Camp) -->
	<div x-init="loadComponent($el, 'camp')"></div>

</body>
</html>
