<!DOCTYPE html>
<html lang="en">
<head>
	<title>Hex Dice Prototype</title>

	<meta charset="UTF-8">
	<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> -->
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="color-scheme" content="light dark">
	<meta name="description" content="Hex Dice">
	<meta name="keywords" content="boardgame,hexagon,dice">
	<meta name="theme-color" content="#ffffff">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="Hex Dice">
	<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">

	<link rel="canonical" :href="host">
	<link rel="shortcut icon" href="/assets/images/favicon.ico" type="image/x-icon">
	<link rel="manifest" href="/manifest.json">
	<link rel="stylesheet" type="text/css" href="/litewind.css" />
	<style>
		.hexagon {
			clip-path: polygon(50% -50%, 100% 50%, 50% 150%, 0 50%);
		}
		.bg-wood {
			background-color: #c3a471aa;
		}
		.bg-hexdefault {
			background-color: #896648;
		}
		.bg-hexselect {
			background-color: #f4ecd8;
		}
		.bg-hexmove {
			background-color: #bd9b6b;
		}
		.bg-hexmerge {
			background-color: #2bcbba;
		}
		.bg-hextarget {
			background-color: #fed330;
		}
		.bg-hexdeploy {
			background-color: #f7b731;
		}
		.bg-hexred {
			background-color: #eb3b5a;
		}
		.bg-hexblue {
			background-color: #3867d6;
		}
		.bg-hexgreen {
			background-color: #19ad62;
		}
		.bg-hexpurple {
			background-color: #a55eea;
		}
		.bg-hexyellow {
			background-color: #c8a00a;
		}
		.bg-hexwhite {
			background-color: #f8f8f8;
		}
		.bg-hexdanger {
			background-color: #705030;
		}
		/* Terrain Colors */
		.bg-hexplain {
			background-color: #896648;
			/*background-image: url('/assets/sprites/terrain/plain.png');
			background-size: cover;
			background-repeat: no-repeat;
			background-position: center;*/
		}
		.bg-hexforest {
			background-color: #896648;
			background-image: url('/assets/sprites/terrain/forest.png');
			background-size: cover;
			background-repeat: no-repeat;
			background-position: center;
		}
		.bg-hexlake {
			background-color: #896648;
			background-image: url('/assets/sprites/terrain/lake.png');
			background-size: cover;
			background-repeat: no-repeat;
			background-position: center;
		}
		.bg-hextower {
			background-color: #896648;
			background-image: url('/assets/sprites/terrain/tower.png');
			background-size: 95%;
			background-repeat: no-repeat;
			background-position: center;
		}
		.bg-hexmountain {
			background-color: #896648;
			background-image: url('/assets/sprites/terrain/mountain.png');
			background-size: 95%;
			background-repeat: no-repeat;
			background-position: center;
		}

		/* Responsive Grid Scaling */
		.hex-grid-container {
			transform-origin: center center;
			max-width: 100%;
			/*transition: zoom 0.3s ease;*/
		}
		@media (max-width: 1280px) {
			.hex-grid-container {
				zoom: 1.2;
			}
		}
		@media (max-width: 1024px) {
			.hex-grid-container {
				zoom: 1.1;
			}
		}
		@media (max-width: 768px) {
			.hex-grid-container {
				zoom: 1.05;
			}
		}
		@media (max-width: 640px) {
			.hex-grid-container {
				zoom: 1;
			}
		}
		@media (max-width: 540px) {
			.hex-grid-container {
				zoom: 0.95;
			}
		}
		@media (max-width: 480px) {
			.hex-grid-container {
				zoom: 0.85;
			}
		}
		@media (max-width: 400px) {
			.hex-grid-container {
				zoom: 0.80;
			}
		}
		@media (max-width: 360px) {
			.hex-grid-container {
				zoom: 0.75;
			}
		}
	</style>
	<style type="text/tailwindcss">
		[x-cloak] { display: none !important; }

		@theme {
			--color-hexdefault: var(--color-lime-700);
			--color-hexselect: var(--color-emerald-400);
			--color-hexmove: var(--color-emerald-300);
			--color-hexmerge: var(--color-emerald-500);
			--color-hextarget: var(--color-amber-500);
			--color-hexdeploy: var(--color-yellow-500);
			--color-hexred: var(--color-red-700);
			--color-hexblue: var(--color-blue-700);
			--color-hexgreen: var(--color-emerald-600);
			--color-hexpurple: var(--color-purple-700);
		}
	</style>
	<style>
		body::before {
			content: '';
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: url('/assets/infographics/hexdice_intro.jpg') center/cover no-repeat;
			/*opacity: 0.5;*/
			z-index: -1;
			filter: contrast(0.1);
		}
	</style>
	<!-- <script type="text/javascript">
		function googleTranslateElementInit() {
			new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
		}
	</script> -->
	<!-- <script async defer src="//cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
	<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" defer async></script>
	<script type="text/javascript" src="/alpine.min.js" defer></script>
	<script type="text/javascript" src="/game.js"></script>
	<script type="text/javascript" src="/ai/ai.js"></script>
	<script type="text/javascript" src="/ai/ai-minimax.js"></script>
	<script type="text/javascript" src="/ai/ai-priority.js"></script>
	<script type="text/javascript" src="/ai/ai-random.js"></script>
	<script type="text/javascript" src="/ai/ai-heuristic.js"></script>
</head>

<body class="text-black min-h-screen flex flex-col items-center bg-white font-mono" x-data="alpineHexDiceTacticGame()">
	<!-- <h1 class="text-xl font-bold mb-2">Hex Dice v1.0 Prototype</h1> -->

	<!-- Romance Mode Banner -->
	<div x-cloak x-show="players.length > 0 && players.every(p => p.isAI) && phase !== 'SETUP_ROLL'"
		class="w-full bg-yellow-100 border-y-2 border-yellow-600 py-2 text-center font-bold text-yellow-800 text-lg">
		👑 Romance of the Dice Kingdoms in Progress 👑
	</div>

	<!-- Hex Grid Container -->
	<div class="flex-grow flex items-center justify-center w-full overflow-auto">
		<!-- Hex Grid -->
		<div class="hex-grid-container relative" :style="hexGrid.style">
			<template x-for="hex in hexes" :key="hex.id">
				<div class="hexagon shadow-md absolute flex items-center justify-center cursor-pointer"
					:class="hexColor(hex)"
					:style="hexStyle(hex, 1)"
					:data-id="hex.id"
					@click="handleHexClick(hex.id)"
				>
					<div class="hex-id fixed self-start text-xs text-gray-300" x-show="debug?.coordinate" x-text="[hex.id].join(' ')"></div>
					<div class="hex-coordinate fixed self-end text-sm text-gray-400" x-show="debug?.coordinate" x-text="[hex.q, hex.r].join(', ')"></div>
					<div class="hex-content text-xs text-center relative"
						@click="unitstat=getUnitOnHex(hex.id) ? hex.id : null"
					>
						<span style="top:-8px;right:-8px;color:#20ee8099" class="absolute font-bold" x-show="!getUnitOnHex(hex.id)" x-text="hex.id"></span>

						<span class="text-lg invisible"
							:class="getUnitOnHex(hex.id) ? PLAYER_CONFIG[getUnitOnHex(hex.id).playerId].logColor : ''"
							x-show="getUnitOnHex(hex.id)"
							x-text="getUnitOnHex(hex.id)?.value"
						>
						</span>

						<span style="top:4px;right:18px;" class="absolute text-blue-900 font-bold"
							x-show="getUnitOnHex(hex.id)?.isGuarding" x-html="(getUnitOnHex(hex.id)?.isGuarding == 2) ? '⛨' : '⛉'">
						</span>
						<span style="top:-2px;right:16px;" class="absolute text-red-900 font-bold"
							x-show="getUnitOnHex(hex.id)?.skirmishBuff">⚔
						</span>
						<span style="top:-14px;right:-12px;" class="absolute text-gray-700"
							:class="(getUnitOnHex(hex.id) && getUnitOnHex(hex.id)?.effectiveArmor > getUnitOnHex(hex.id)?.armor) ? 'font-bold' : ''"
							x-show="getUnitOnHex(hex.id)" x-text="calcDefenderEffectiveArmor(hex.id)">
						</span>
						<span style="top:-14px;right:-4px;" class="absolute text-blue-700"
							x-show="getUnitOnHex(hex.id)?.isRerolled">®
						</span>
						<span style="top:-14px;right:12px;" class="absolute text-red-700"
							x-show="getUnitOnHex(hex.id)" x-text="getUnitOnHex(hex.id)?.attack">
						</span>
						<span style="top:24px;right:-12px;" class="absolute font-bold text-red-700"
							x-show="getUnitOnHex(hex.id)?.armorReduction > 0" x-text="'-' + getUnitOnHex(hex.id)?.armorReduction">
						</span>
					</div>
				</div>
			</template>

			<!-- Trail Arrow -->
			<svg :height="hexGrid.gridHeight" :width="hexGrid.gridWidth" class="absolute inset-0 pointer-events-none z-10" x-show="!phase.startsWith('SETUP')">
				<!-- Movement -->
				<g x-show="trail && trail.fromHex && trail.toHex">
					<circle
						:cx="trail.fromHex?.trailX || 0" :cy="trail.fromHex?.trailY || 0"
						r="3" style="fill: black;"
					/>
					<line
						:x1="trail.fromHex?.trailX || 0"
						:y1="trail.fromHex?.trailY || 0"
						:x2="trail.fromHex?.trailX + (trail.toHex?.trailX - trail.fromHex?.trailX) * 0.55 * Math.log1p(trail.dist + 1) || 0"
						:y2="trail.fromHex?.trailY + (trail.toHex?.trailY - trail.fromHex?.trailY) * 0.55 * Math.log1p(trail.dist + 1) || 0"
						style="stroke-width: 2;stroke: black;"
					/>
				</g>

				<!-- Attack -->
				<g x-show="trailAttack && trailAttack.fromHex && trailAttack.toHex">
					<circle
						:cx="trailAttack.fromHex?.trailX || 0" :cy="trailAttack.fromHex?.trailY || 0"
						r="3" style="fill: gray;"
					/>
					<line
						:x1="trailAttack.fromHex?.trailX || 0"
						:y1="trailAttack.fromHex?.trailY || 0"
						:x2="trailAttack.fromHex?.trailX + (trailAttack.toHex?.trailX - trailAttack.fromHex?.trailX) * 0.55 * Math.log1p(trailAttack.dist + 1) || 0"
						:y2="trailAttack.fromHex?.trailY + (trailAttack.toHex?.trailY - trailAttack.fromHex?.trailY) * 0.55 * Math.log1p(trailAttack.dist + 1) || 0"
						style="stroke-width: 2;stroke: gray;stroke-dasharray: 4;"
					/>
				</g>
			</svg>

			<div class="hex-unitstat fixed left-2 top-2 text-xs text-gray-600 font-bold" x-show="unitstat" x-html="calcUIDiceStat(unitstat)"></div>
		</div>
	</div>

	<div id="game-controller" class="w-full flex flex-col items-center">
		<!-- Game Setup -->
		<div x-cloak x-show="phase.startsWith('SETUP')" class="bg-wood mb-1 p-4 border border-black text-center">
			<!-- <h2 class="text-xl mb-2" x-text="setupStatusMessage()"></h2> -->
			<div x-show="phase === 'SETUP_ROLL'">
				<div class="mb-4">
					<span class="mr-2 font-bold text-sm">Players:</span>
					<a href="?players=2" class="border border-black px-2 py-1 mx-1 hover:bg-black hover:text-white" :class="playerCount === 2 ? 'bg-black text-white' : ''">2</a>
					<a href="?players=3" class="border border-black px-2 py-1 mx-1 hover:bg-black hover:text-white" :class="playerCount === 3 ? 'bg-black text-white' : ''">3</a>
					<a href="?players=4" class="border border-black px-2 py-1 mx-1 hover:bg-black hover:text-white" :class="playerCount === 4 ? 'bg-black text-white' : ''">4</a>
					<a href="?players=6" class="border border-black px-2 py-1 mx-1 hover:bg-black hover:text-white" :class="playerCount === 6 ? 'bg-black text-white' : ''">6</a>
				</div>
				<button class="cursor-pointer border border-black px-4 py-2 hover:bg-black hover:text-white mb-2" @click="randomStart()" >Start Random</button>
				<button class="cursor-pointer border border-black px-4 py-2 hover:bg-black hover:text-white" @click="players.forEach((p, i) => rollInitialDice(i))" >Start Normal: Roll The Dice</button>
				<button class="cursor-pointer border border-black px-4 py-2 hover:bg-black hover:text-white" x-show="!players[0]?.initialRollDone && !players[1]?.initialRollDone" @click="resetGame({isCampaign: true}); players.forEach((p, i) => i > 0 && rollInitialDice(i))" >Start Against AI</button>
				<button class="cursor-pointer px-4 py-2 hover:bg-yellow-600 hover:text-white mb-2 font-bold bg-yellow-100" @click="startRomanceMode()" >RotDK</button>
				</div>

				<a href="/rules.html" target="_blank" class="text-sm underline hover:text-blue-700">Game Rules</a>
				<a href="#" class="text-sm underline hover:text-blue-700 ml-2" @click="showLog = !showLog">Logs</a>
				<!-- <div id="google_translate_element"></div> -->
				</div>
			</div>
			<div x-show="phase === 'SETUP_REROLL'" class="bg-wood">
				<p class="mb-2">Player <span x-text="currentPlayerIndex + 1"></span> (<span x-text="players[currentPlayerIndex].color"></span>), select up to <span x-text="rules.maxRerolls"></span> dice to reroll:</p>
				<div class="flex justify-center space-x-2 mb-2">
					<template x-for="(die, index) in players[currentPlayerIndex].dice" :key="index">
						<div x-show="!die.isDeployed" class="p-2 border border-black cursor-pointer"
							 :class="{'bg-black text-white': diceToReroll.includes(index)}"
							 @click="toggleRerollSelection(index)">
							<span x-text="die.value"></span>
						</div>
					</template>
				</div>
				<button @click="performReroll()" class="border border-black px-4 py-2 hover:bg-black hover:text-white" :disabled="!canConfirmReroll()">Confirm Reroll (<span x-text="diceToReroll.length"></span>)</button>
				<button @click="skipReroll()" class="border border-black px-4 py-2 hover:bg-black hover:text-white ml-2">Skip Reroll</button>
			</div>
			 <div x-show="phase === 'SETUP_DEPLOY'">
				<p class="mb-2">Player <span x-text="currentPlayerIndex + 1"></span> (<span x-text="players[currentPlayerIndex].color"></span>), deploy your units.</p>
				<div class="flex justify-center space-x-1 mb-2">
					<template x-for="(die, index) in players[currentPlayerIndex].dice" :key="index">
						<div
							class="p-1 border border-black text-xs cursor-pointer"
							:class="
								[
									selectedDieToDeploy === index ? 'bg-black text-white font-bold' : '',
									players[currentPlayerIndex]?.dice[index]?.isDeployed ? 'border-dashed' : '',
								].join(' ')
							"
							@click="selectDieToDeploy(index)">
							Dice <span x-text="players[currentPlayerIndex].dice[index]?.value"></span>
						</div>
					</template>
				</div>
			</div>
		</div>

		<!-- Game Over -->
		<div x-cloak x-show="phase === 'GAME_OVER'" class="bg-wood mb-1 py-2 px-4 border border-black text-center">
			<h2 class="text-2xl mb-2 font-bold">GAME OVER</h2>
			<p x-text="winnerMessage"></p>
			<button class="cursor-pointer mt-3 border border-black px-4 py-2 hover:bg-black hover:text-white"
				@click="resetGame({isP2AI: new URLSearchParams(location.search).get('mode') == 'campaign'})"
			>New Game</button>
		</div>

		<!-- Action Mode Info -->
		<div x-cloak x-show="false && (actionMode !== null)" class="bg-wood mb-1 py-2 px-4 border border-black text-center">
			<p x-text="actionModeMessage()"></p>
			<button @click="cancelAction()" class="mt-2 border border-black px-3 py-1 text-sm hover:bg-black hover:text-white">Cancel Action</button>
		</div>

		<!-- Game Info -->
		<div x-cloak x-show="!phase.startsWith('SETUP') && phase !== 'GAME_OVER'" class="bg-wood mb-1 py-2 px-4 border border-black text-center">
			<div class="my-2 space-x-2">
				<button class="hidden cursor-pointer border border-black p-1 hover:bg-black hover:text-white"
					x-show="actionMode !== 'ORACLE_SPELL_SELECT' && (selectedUnitHexId !== null) && canPerformAction(selectedUnitHexId, 'MOVE')"
					@click="initiateAction('MOVE')"
				>MOVE</button>
				<button class="cursor-pointer border border-black p-1 hover:bg-black hover:text-white"
					x-show="actionMode !== 'ORACLE_SPELL_SELECT' && (selectedUnitHexId !== null) && canPerformAction(selectedUnitHexId, 'REROLL')"
					@click="performAction('REROLL', selectedUnitHexId)"
				>REROLL</button>
				<button class="cursor-pointer border border-black p-1 hover:bg-black hover:text-white"
					x-show="actionMode !== 'ORACLE_SPELL_SELECT' && (selectedUnitHexId !== null) && canPerformAction(selectedUnitHexId, 'GUARD')"
					@click="performAction('GUARD', selectedUnitHexId)"
				>GUARD</button>
				<button class="hidden cursor-pointer border border-black p-1 hover:bg-black hover:text-white"
					x-show="actionMode !== 'ORACLE_SPELL_SELECT' && (selectedUnitHexId !== null) && canPerformAction(selectedUnitHexId, 'RANGED_ATTACK')"
					@click="initiateAction('RANGED_ATTACK')"
				>RANGE</button>
				<button class="cursor-pointer border border-black p-1 hover:bg-black hover:text-white"
					x-show="actionMode !== 'ORACLE_SPELL_SELECT' && (selectedUnitHexId !== null) && canPerformAction(selectedUnitHexId, 'SPECIAL_ATTACK')"
					@click="initiateAction('SPECIAL_ATTACK')"
					x-text="getUnitOnHex(selectedUnitHexId)?.value === 6 ? 'SPELLS' : 'SPL ATK'"
				></button>

				<div x-show="actionMode === 'ORACLE_SPELL_SELECT'" class="inline-block space-x-1">
					<button class="cursor-pointer border border-black p-1 bg-blue-100 hover:bg-blue-300" @click="selectOracleSpell('SHIELD')">SHIELD</button>
					<button class="cursor-pointer border border-black p-1 bg-blue-100 hover:bg-blue-300" @click="selectOracleSpell('SWAP')">SWAP</button>
					<button class="cursor-pointer border border-black p-1 bg-blue-100 hover:bg-blue-300" @click="selectOracleSpell('SKIRMISH')">SKIRMISH</button>
				</div>

				<button class="cursor-pointer border border-black p-1 hover:bg-black hover:text-white"
					x-show="actionMode !== 'ORACLE_SPELL_SELECT' && options.includes('m') && (selectedUnitHexId !== null) && canPerformAction(selectedUnitHexId, 'MERGE')"
					@click="initiateAction('MERGE')"
				>MERGE</button>
				<button class="cursor-pointer border border-black p-1 hover:bg-black hover:text-white font-bold bg-red-100"
					x-show="actionMode !== 'ORACLE_SPELL_SELECT' && (selectedUnitHexId !== null) && canPerformAction(selectedUnitHexId, 'ORACLE_SACRIFICE')"
					@click="initiateAction('ORACLE_SACRIFICE')"
				>SACRIFICE</button>
				<button class="cursor-pointer border border-black p-1 hover:bg-black hover:text-white font-bold"
					x-show="actionMode !== null"
					@click="cancelAction()"
				>CANCEL</button>
				<button class="cursor-pointer border border-black p-1 hover:bg-black hover:text-white font-bold"
					@click="endTurn()"
				>END TURN</button>
			</div>

			<p class="text-sm font-bold">
				<span x-show="players.every(p => p.isAI)" class="text-yellow-700">👑 Romance Mode - </span>
				Current Turn: Player <span x-text="(currentPlayerIndex + 1) + (players[currentPlayerIndex].isAI ? ' [AI] ' :'')"></span> (<span x-text="players[currentPlayerIndex].color"></span>)
			</p>
			<a href="#" class="text-sm underline hover:text-blue-700 ml-2" @click="showLog = !showLog">Logs</a>
		</div>
	</div>

	<!-- Message Log -->
	<div x-show="showLog" class="bg-wood bottom-0 left-0 w-full text-black bg-white p-2 text-xs font-mono h-36 overflow-y-auto border-t border-black" id="messageLogContainer">
		<template x-for="log in messageLog" :key="log.id">
			<p x-text="log.message" :class="PLAYER_CONFIG[ (log.message?.match(/P(\d)/)?.[1] || 1) - 1 ]?.logColor"></p>
		</template>
	</div>

	<script>
		// Register the service worker
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				navigator.serviceWorker.register('/service-worker.js')
					.then(registration => {
						console.log('ServiceWorker registration successful with scope: ', registration.scope);
						
						// Check for updates
						registration.addEventListener('updatefound', () => {
							const newWorker = registration.installing;
							newWorker.addEventListener('statechange', () => {
								if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
									console.log('New version available. Reload to update.');
								}
							});
						});
					})
					.catch(error => {
						console.log('ServiceWorker registration failed: ', error);
					});
			});
		}
	</script>
</body>

</html>
